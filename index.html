<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luxemburg Index-Tranche Live</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
  <div class="max-w-5xl mx-auto p-8">
    <h1 class="text-4xl font-bold text-lime-400 mb-2">🇱🇺 Luxemburg Index-Tranche</h1>
    <p class="text-gray-400 mb-8">Live-Stand des STATEC indice raccordé base 1.1.1948 • Automatisch aktualisiert</p>

    <div id="status" class="mb-8"></div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <div class="bg-gray-900 rounded-2xl p-6">
        <p class="text-sm text-gray-400">Letzte Moyenne semestrielle (C2)</p>
        <p id="c2" class="text-5xl font-bold text-white">—</p>
        <p id="date" class="text-sm text-lime-400"></p>
      </div>
      <div class="bg-gray-900 rounded-2xl p-6">
        <p class="text-sm text-gray-400">Aktuelle Cote d’application</p>
        <p id="cote_app" class="text-5xl font-bold text-white">—</p>
      </div>
      <div class="bg-gray-900 rounded-2xl p-6">
        <p class="text-sm text-gray-400">Nächster Schwellenwert</p>
        <p id="next" class="text-5xl font-bold text-lime-400">—</p>
        <p id="to_next" class="text-sm"></p>
      </div>
    </div>

    <div class="mt-10">
      <canvas id="chart" height="130"></canvas>
    </div>

    <div class="mt-12 text-sm text-gray-400">
      <p>Quelle: <a href="https://statistiques.public.lu/dam-assets/fr/donnees-autres-formats/indicateurs-court-terme/economie-totale-prix/E5010.xls" class="underline">STATEC E5010.xls</a></p>
      <p id="last_updated" class="mt-4"></p>
    </div>
  </div>

  <script>
    fetch('data.json')
      .then(r => r.json())
      .then(d => {
        document.getElementById("c2").textContent = d.c2;
        document.getElementById("date").textContent = `Stand: ${d.latest_date}`;
        document.getElementById("cote_app").textContent = d.last_cote_app;
        document.getElementById("next").textContent = d.next_threshold;
        document.getElementById("to_next").innerHTML = `Noch <span class="font-bold">${(d.next_threshold - d.c2).toFixed(2)}</span> Punkte (${d.percent_to_next.toFixed(1)} % bis +2,5 % Tranche)`;

        document.getElementById("last_updated").textContent = `Letzte Aktualisierung: ${d.updated}`;

        // === NEUER CHART MIT SCHWELLENWERT-LINIEN ===
        const ctx = document.getElementById("chart");
        const labels = d.series.map(s => s.date);

        new Chart(ctx, {
          type: 'line',
          data: {
            labels: labels,
            datasets: [
              {
                label: 'C1 Index',
                data: d.series.map(s => s.c1),
                borderColor: '#a3e635',
                tension: 0.2,
                borderWidth: 3
              },
              {
                label: 'C2 Moyenne semestrielle',
                data: d.series.map(s => s.c2),
                borderColor: '#22d3ee',
                tension: 0.2,
                borderWidth: 3
              },
              {
                label: 'Aktueller Schwellenwert (Cote d’échéance)',
                data: Array(labels.length).fill(d.last_cote_ech),
                borderColor: '#f43f5e',
                borderDash: [8, 4],
                borderWidth: 3,
                pointRadius: 0,
                tension: 0
              },
              {
                label: 'Nächster Schwellenwert (+2,5 % Tranche)',
                data: Array(labels.length).fill(d.next_threshold),
                borderColor: '#eab308',
                borderDash: [2, 2],
                borderWidth: 2,
                pointRadius: 0,
                tension: 0
              }
            ]
          },
          options: {
            plugins: {
              legend: { position: 'top', labels: { color: '#e5e7eb', boxWidth: 12 } }
            },
            scales: {
              y: {
                grid: { color: '#374151' },
                ticks: { color: '#e5e7eb' }
              },
              x: {
                grid: { color: '#374151' },
                ticks: { color: '#e5e7eb', maxRotation: 45 }
              }
            }
          }
        });
      });
  </script>
</body>
</html>
